name: GitOps Deployment Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'generated/**'

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Identify changed environments
        id: envs
        run: |
          # Find folders in generated/ that changed in the last commit
          CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | grep '^generated/' | cut -d/ -f1,2 | sort -u || true)
          echo "Changed directories:"
          echo "$CHANGED_DIRS"
          
          # Convert newlines to spaces so bash loop handles it
          DIRS_SPACE=$(echo "$CHANGED_DIRS" | tr '\n' ' ')
          echo "dirs=$DIRS_SPACE" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Deploy Environment(s)
        run: |
          for dir in ${{ steps.envs.outputs.dirs }}; do
            if [ -z "$dir" ] || [ ! -d "$dir" ]; then 
              continue 
            fi
            
            echo "=================================================="
            echo "Starting deployment checks for: $dir"
            echo "=================================================="
            
            if [ -f "$dir/docker-compose.yml" ]; then
              echo "🐳 Detected Docker Compose configuration."
              echo "Validating compose configuration syntax..."
              docker compose -f "$dir/docker-compose.yml" config
              echo "Executing deployment (simulated):"
              echo "docker compose -f $dir/docker-compose.yml up -d"
              echo "🚀 Docker containers successfully deployed!"
            elif [ -f "$dir/main.tf" ]; then
              echo "🏗️ Detected Terraform / AWS configuration."
              echo "Initializing Terraform..."
              cd "$dir"
              terraform init -backend=false
              echo "Validating configuration..."
              terraform validate
              echo "Running terraform plan..."
              terraform plan -no-color
              echo "🚀 Terraform configuration successfully verified and planned!"
              cd - > /dev/null
            else
              echo "No actionable deployment files found in $dir."
            fi
          done
